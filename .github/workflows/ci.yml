name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate index.json is valid JSON
        run: |
          if [ -f index.json ]; then
            jq empty index.json
          fi

      - name: Check markdown files have frontmatter
        run: |
          for f in methodology/*.md commands/*.md skills/*/SKILL.md; do
            if [ -f "$f" ]; then
              head -1 "$f" | grep -q '^---$' || { echo "Missing frontmatter: $f"; exit 1; }
            fi
          done

      - name: Check all skill files have required canonical sections
        run: |
          # Wave 4a removed MATILHA_MANAGED markers; the plugin path is now source of truth.
          # Current contract: each SKILL.md must carry the 12 canonical body sections
          # defined in docs/matilha/skill-authoring-guide.md. Full validation lives in
          # the matilha CLI validator (tests/registry/content-validation.test.ts).
          required_sections=(
            "## When this fires"
            "## Preconditions"
            "## Execution Workflow"
            "## Rules: Do"
            "## Rules: Don't"
            "## Expected Behavior"
            "## Quality Gates"
            "## Companion Integration"
            "## Output Artifacts"
            "## Example Constraint Language"
            "## Troubleshooting"
          )
          failed=0
          for f in skills/*/SKILL.md; do
            if [ -f "$f" ]; then
              for section in "${required_sections[@]}"; do
                grep -qF "$section" "$f" || { echo "Missing '$section' in $f"; failed=1; }
              done
            fi
          done
          if [ $failed -ne 0 ]; then exit 1; fi

      - name: Validate templates have placeholder syntax
        run: |
          for f in templates/*.tmpl; do
            if [ -f "$f" ]; then
              grep -q '{{[a-zA-Z_]*}}' "$f" || { echo "No placeholders found in $f (expected at least one)"; exit 1; }
            fi
          done

      - name: Validate companions.json is valid JSON
        run: |
          if [ -f companions.json ]; then
            jq empty companions.json
          fi
